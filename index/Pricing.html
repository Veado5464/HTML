<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Installtion</title>
    <link rel="stylesheet" href="/CSS/Pricing.css">
    
</head>
<link rel="stylesheet" href="../JS/Submit.js">
<body>    
    <div id="pricing">
        <nav id="center-nav">
            <ul id="nav-bar" class="nav">
                <li class="nav"><a href="../index.html">Home</a></li>
                <li class="nav"><a href="/index/MyStuff.html">My Passion</a></li>
            </ul>
        </nav>
        <form action="send email" method="post">
            <div id="name">
                <p>Name</p>
                <input class="input-info" type="text" name="Name" placeholder="Your Name" required>
            </div>
            <div id="phone">
                <p>Phone</p>
                <input class="input-info" type="tel" name="Phone" placeholder="Phone Number" required>
            </div>
            <div>
                <address id="address">
                    <div id="street">
                        <p>Street Address</p>
                        <input class="input-info" type="text" id="addressbar" placeholder="Street Address" required>
                    </div>
                    <div id="city">
                        <p>City</p>
                        <input class="input-info" type="text" placeholder="City" required>
                        <p>Zip Code</p>
                        <input class="input-info" id="zip" type="text" pattern="[0-9]{5}" placeholder="Zip Code" required>
                    </div>
                </address>
            </div>
            <div id="input">
                <p>Description</p>
                <input type="text" name="Description" id="info" placeholder="Please describe what you need in detail. Example: 'I need an 85 inch screen TV mounted.'" required>
            </div>
            <div id="fileUpload">
                <input type="file" id="myFile" name="filename">
                <a href="./Submit.html" target="_blank">
                <button type="button" id="submit">Submit</button>
                </a>
            </div>
        </form>
    </div>
    <script>
        var message = 'Hello, I will only be servicing a radius of 50 miles from Whittier, Ca';
        alert(message);
        let submitButton = document.getElementById('submit');
        submitButton.addEventListener('click', function() {
            emailjs.send
        });
    </script>
</body>
</html>
